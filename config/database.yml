default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: postgresql-16-tikloudreunion.i.aivencloud.com
  port: 17927
  username: <%= ENV.fetch("POSTGRES_USERNAME") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") %>
  sslmode: require

development:
  <<: *default
  database: development

test:
  <<: *default
  database: test

production:
  primary: &primary_production
    <<: *default
    database: production

  cache:
    <<: *primary_production
    database: production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: production_cable
    migrations_paths: db/cable_migrate
